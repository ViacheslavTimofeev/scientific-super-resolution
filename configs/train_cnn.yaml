experiment_name: cnn_x2_baseline
seed: 42
device: cuda

data:
  scale: 2
  image_mode: L
  patch_size: 128
  random_flip: true
  random_rotate: true
  train:
    lr_dir: ./DeepRockSR-2D/shuffled2D/shuffled2D_train_LR_default_X2
    hr_dir: ./DeepRockSR-2D/shuffled2D/shuffled2D_train_HR
    batch_size: 16
    shuffle: true
    num_workers: 4
    pin_memory: true
  valid:
    lr_dir: ./DeepRockSR-2D/shuffled2D/shuffled2D_valid_LR_default_X2
    hr_dir: ./DeepRockSR-2D/shuffled2D/shuffled2D_valid_HR
    batch_size: 1
    shuffle: false
    num_workers: 2
    pin_memory: true

model:
  kind: cnn
  in_channels: 1
  out_channels: 1
  feature_channels: 52
  upscale: 2
  act: relu

train:
  epochs: 100
  optimizer:
    name: adamw
    lr: 1.0e-4
    weight_decay: 1.0e-5
    betas: [0.9, 0.99]
  scheduler:
    name: step_lr
    step_size: 30
    gamma: 0.5
  loss:
    name: l1
  amp: false
  grad_clip_norm: null
  log_every: 50
  validate_every: 1
  save_best_metric: psnr

eval:
  metric_names: [psnr, ssim]
  save_images: true
  num_visualizations: 16

output:
  dir: ./outputs/cnn_x2_baseline
  checkpoint_dir: ./outputs/cnn_x2_baseline/checkpoints
  best_checkpoint_name: best.pt
  last_checkpoint_name: last.pt
