experiment_name: swinir_x4_latency  # [любая строка], str, имя benchmark-запуска
device: cuda  # [cpu, cuda, cuda:0], str, устройство по умолчанию для benchmark

model:
  kind: swinir  # [swinir], str, тип модели
  in_chans: 3  # [1, 3], int, число входных каналов
  img_size: 64  # [любое целое > 0], int, базовый размер изображения для SwinIR
  patch_size: 1  # [любое целое > 0], int, размер патча для embedding
  embed_dim: 180  # [любое целое > 0], int, размерность embedding
  depths: [6, 6, 6, 6, 6, 6]  # [[...]], list[int], число блоков в каждом уровне
  num_heads: [6, 6, 6, 6, 6, 6]  # [[...]], list[int], число attention-heads по уровням
  window_size: 8  # [любое целое > 0], int, размер окна attention
  mlp_ratio: 2.0  # [любое float > 0], float, коэффициент расширения MLP
  qkv_bias: true  # [true, false], bool, добавляет bias в QKV-проекции
  drop_rate: 0.0  # [любое float >= 0], float, dropout после линейных слоев
  attn_drop_rate: 0.0  # [любое float >= 0], float, dropout attention-весов
  drop_path_rate: 0.1  # [любое float >= 0], float, stochastic depth rate
  patch_norm: true  # [true, false], bool, включает нормализацию patch embedding
  use_checkpoint: false  # [true, false], bool, включает gradient checkpointing
  upscale: 4  # [2, 3, 4, 8], int, апскейл модели
  img_range: 1.0  # [любое float > 0], float, диапазон значений изображения
  upsampler: pixelshuffle  # [pixelshuffle, pixelshuffledirect, nearest+conv, ''], str, тип upsampler
  resi_connection: 1conv  # [1conv, 3conv], str, тип residual connection

benchmark:
  checkpoint_path: ./outputs/swinir_x4_baseline/checkpoints/best.pth  # [путь к файлу], str, путь до checkpoint для benchmark
  input_shape: [1, 3, 512, 512]  # [[batch, channels, height, width]], list[int], форма synthetic input для latency benchmark
  device: cuda  # [cpu, cuda, cuda:0], str, устройство для benchmark, если нужно переопределить глобальное
  dtype: float32  # [float32, fp32, float16, fp16], str, тип входного тензора для benchmark
  warmup_iters: 10  # [любое целое >= 0], int, число warmup-итераций перед замером
  benchmark_iters: 100  # [любое целое > 0], int, число итераций для расчета latency
  save_results_path: ./outputs/benchmarks/swinir_x4_latency.json  # [путь к файлу], str, куда сохранить benchmark summary в JSON
